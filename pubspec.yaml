name: notex
description: "NoteX - A professional desktop notes app with Hexagonal Architecture & DDD"
publish_to: 'none'
version: 1.43.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Local persistence
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Rich text editor
  flutter_quill: ^11.1.0

  # Markdown rendering
  flutter_markdown: ^0.7.6

  # DI
  get_it: ^8.0.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1

  # Calendar
  table_calendar: ^3.2.0

  # File picker
  file_picker: ^8.1.7

  # Color picker
  flutter_colorpicker: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.8

  # Window management (frameless + rounded corners)
  window_manager: ^0.3.9
  screen_retriever: ^0.1.9
  flutter_acrylic: ^1.1.4
  morphable_shape: ^2.0.0

  # Masonry grid layout
  flutter_staggered_grid_view: ^0.7.0

  # Color palette extraction from images
  palette_generator_master: ^1.0.1

  # Supabase (remote backend + auth)
  supabase_flutter: ^2.8.0

  # Google OAuth on desktop

  # Network connectivity monitoring
  connectivity_plus: ^6.1.0
  provider: ^6.1.5+1
  url_launcher: ^6.3.2

  # HTTP client (GitHub API for auto-updates)
  http: ^1.2.2

  # Video playback for background videos (Wallpaper Engine style)
  media_kit: ^1.1.10
  media_kit_video: ^1.1.10
  media_kit_libs_windows_video: ^1.0.9
  media_kit_libs_macos_video: ^1.0.7
  media_kit_libs_linux: ^1.1.3
  media_kit_libs_ios_video: ^1.1.4
  media_kit_libs_android_video: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  image_path: "assets/icons/logo.png"
  android:
    generate: true
    image_path: "assets/icons/logo.png"
  ios:
    generate: true
    image_path: "assets/icons/logo.png"
  windows:
    generate: true
    image_path: "assets/icons/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/logo.png"
  linux:
    generate: true
    image_path: "assets/icons/logo.png"

flutter_native_splash:
  color: "#0F1120"
  color_dark: "#0F1120"
  image: "assets/icons/logo.png"
  android: true
  ios: true
  android_12:
    color: "#0F1120"
    color_dark: "#0F1120"
    image: "assets/icons/logo.png"

flutter:
  uses-material-design: true

  assets:
    # ── Bundled images (listed individually to exclude .mp4 files) ──
    - assets/images/anime-night-sky-illustration.jpg
    - assets/images/anime-style-boy-girl-couple-love.jpg
    - assets/images/anime-style-boy-girl-couple.jpg
    - assets/images/anime-style-mythical-dragon-creature (1).jpg
    - assets/images/anime-style-mythical-dragon-creature.jpg
    - assets/images/fantasy-anime-style-scene.jpg
    - assets/images/illustration-anime-character-rain.jpg
    - assets/images/illustration-anime-city (1).jpg
    - assets/images/illustration-anime-city.jpg
    - assets/images/japan-background-digital-art.jpg
    - assets/images/magenta-landscape-with-fantasy-nature.jpg
    - assets/images/mythical-dragon-beast-anime-style (1).jpg
    - assets/images/mythical-dragon-beast-anime-style.jpg
    - assets/images/1311994.jpeg
    - assets/images/896653.jpg
    - assets/images/clay-banks-hwLAI5lRhdM-unsplash.jpg
    # ── Videos are NOT bundled — downloaded on demand via BackgroundDownloader ──
    # ── Video thumbnails (generated by scripts/generate_video_thumbnails.py) ──
    - assets/thumbnails/
    - assets/icons/
