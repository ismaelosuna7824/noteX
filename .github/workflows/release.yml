name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Secrets required (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — https://your-project.supabase.co
#   SUPABASE_ANON_KEY  — your Supabase anon/public key

jobs:
  # ── Windows — .exe installer via Inno Setup ────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=dart_defines.json

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc windows\notex_installer.iss
          Move-Item -Path windows\NoteX-windows-setup.exe -Destination NoteX-windows-setup.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-windows
          path: NoteX-windows-setup.exe

  # ── macOS — .dmg via create-dmg ───────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build macOS
        run: flutter build macos --release --dart-define-from-file=dart_defines.json

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS DMG
        run: |
          create-dmg \
            --volname "NoteX" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "notex.app" 150 145 \
            --hide-extension "notex.app" \
            --app-drop-link 450 145 \
            "NoteX-macos.dmg" \
            "build/macos/Build/Products/Release/"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-macos
          path: NoteX-macos.dmg

  # ── Linux — .deb package ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsqlite3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build Linux
        run: flutter build linux --release --dart-define-from-file=dart_defines.json

      - name: Build DEB package
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          mkdir -p deb/usr/lib/notex
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN

          # Copy app bundle
          cp -r build/linux/x64/release/bundle/. deb/usr/lib/notex/

          # Desktop entry
          cat > deb/usr/share/applications/notex.desktop << 'EOF'
          [Desktop Entry]
          Name=NoteX
          Comment=A beautiful desktop notes app
          Exec=/usr/lib/notex/notex
          Icon=notex
          Terminal=false
          Type=Application
          Categories=Utility;Office;
          EOF

          # Debian control file
          cat > deb/DEBIAN/control << EOF
          Package: notex
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: NoteX <noreply@github.com>
          Description: NoteX - A beautiful desktop notes app
           Rich text editing, Markdown support, projects, cloud sync via Supabase.
          EOF

          chmod 755 deb/DEBIAN
          dpkg-deb --build deb NoteX-linux.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-linux
          path: NoteX-linux.deb

  # ── Create GitHub Release ──────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NoteX-windows/NoteX-windows-setup.exe
            artifacts/NoteX-macos/NoteX-macos.dmg
            artifacts/NoteX-linux/NoteX-linux.deb
