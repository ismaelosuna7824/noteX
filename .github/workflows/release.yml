name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Secrets required (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — your Supabase project URL
#   SUPABASE_ANON_KEY  — your Supabase anon/public key

jobs:
  # ── Windows Build ──────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        shell: pwsh
        run: |
          Set-Content -Path dart_defines.json -Value '{"SUPABASE_URL":"${{ secrets.SUPABASE_URL }}","SUPABASE_ANON_KEY":"${{ secrets.SUPABASE_ANON_KEY }}"}'

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=dart_defines.json

      - name: Archive Windows build
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath NoteX-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-windows
          path: NoteX-windows.zip

  # ── macOS Build ────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        run: |
          echo '{"SUPABASE_URL":"${{ secrets.SUPABASE_URL }}","SUPABASE_ANON_KEY":"${{ secrets.SUPABASE_ANON_KEY }}"}' > dart_defines.json

      - name: Build macOS
        run: flutter build macos --release --dart-define-from-file=dart_defines.json

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/NoteX-macos.zip" notex.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-macos
          path: NoteX-macos.zip

  # ── Linux Build ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsqlite3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        run: |
          echo '{"SUPABASE_URL":"${{ secrets.SUPABASE_URL }}","SUPABASE_ANON_KEY":"${{ secrets.SUPABASE_ANON_KEY }}"}' > dart_defines.json

      - name: Build Linux
        run: flutter build linux --release --dart-define-from-file=dart_defines.json

      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/NoteX-linux.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-linux
          path: NoteX-linux.tar.gz

  # ── Create GitHub Release ──────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NoteX-windows/NoteX-windows.zip
            artifacts/NoteX-macos/NoteX-macos.zip
            artifacts/NoteX-linux/NoteX-linux.tar.gz
