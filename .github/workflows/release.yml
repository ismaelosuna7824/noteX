name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Secrets required (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — https://your-project.supabase.co
#   SUPABASE_ANON_KEY  — your Supabase anon/public key

jobs:
  # ── Windows — Inno Setup .exe installer ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=dart_defines.json

      - name: Build Inno Setup installer
        run: iscc windows\notex_installer.iss

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-windows
          path: windows/NoteX-windows-setup.exe

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── macOS — .zip (ad-hoc signed) ──────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Apply macOS squircle icon shape
        run: |
          pip3 install Pillow --quiet --break-system-packages
          python3 scripts/apply_macos_icon.py

      - name: Patch Xcode signing for CI
        # Removes the Apple Developer team and switches to ad-hoc signing so
        # xcodebuild doesn't look for a "Mac Development" certificate that
        # doesn't exist on the runner. We re-sign with codesign --sign - after.
        run: |
          python3 - << 'EOF'
          import pathlib
          pbx = pathlib.Path('macos/Runner.xcodeproj/project.pbxproj')
          txt = pbx.read_text()
          txt = txt.replace('DEVELOPMENT_TEAM = 2CAK428VHF;',          'DEVELOPMENT_TEAM = "";')
          txt = txt.replace('CODE_SIGN_STYLE = Automatic;',             'CODE_SIGN_STYLE = Manual;')
          txt = txt.replace('CODE_SIGN_IDENTITY = "Apple Development";','CODE_SIGN_IDENTITY = "-";')
          txt = txt.replace('"CODE_SIGN_IDENTITY[sdk=macosx*]" = "Apple Development";',
                            '"CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";')
          pbx.write_text(txt)
          print("Patched project.pbxproj for CI signing")
          EOF

      - name: Build macOS
        run: flutter build macos --release --dart-define-from-file=dart_defines.json

      - name: Sign app (ad-hoc — avoids "malware" Gatekeeper message)
        run: |
          codesign --force --deep --sign - \
            build/macos/Build/Products/Release/notex.app

      - name: Create macOS ZIP
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent notex.app ../../../../../NoteX-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-macos
          path: NoteX-macos.zip

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── Linux — .deb package ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsqlite3-dev \
            libasound2-dev libmpv-dev pkg-config

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build Linux
        run: flutter build linux --release --dart-define-from-file=dart_defines.json

      - name: Build DEB package
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          mkdir -p deb/usr/lib/notex
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN

          # Copy app bundle
          cp -r build/linux/x64/release/bundle/. deb/usr/lib/notex/

          # Desktop entry
          cat > deb/usr/share/applications/notex.desktop << 'EOF'
          [Desktop Entry]
          Name=NoteX
          Comment=A beautiful desktop notes app
          Exec=/usr/lib/notex/notex
          Icon=notex
          Terminal=false
          Type=Application
          Categories=Utility;Office;
          EOF

          # Debian control file
          cat > deb/DEBIAN/control << EOF
          Package: notex
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: NoteX <noreply@github.com>
          Description: NoteX - A beautiful desktop notes app
           Rich text editing, Markdown support, projects, cloud sync via Supabase.
          EOF

          chmod 755 deb/DEBIAN
          dpkg-deb --build deb NoteX-linux.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-linux
          path: NoteX-linux.deb

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── Android — signed APK ─────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../android/upload-keystore.jks
          EOF

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=dart_defines.json

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk NoteX-android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-android
          path: NoteX-android.apk

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── Create GitHub Release ──────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NoteX-windows/NoteX-windows-setup.exe
            artifacts/NoteX-macos/NoteX-macos.zip
            artifacts/NoteX-linux/NoteX-linux.deb
            artifacts/NoteX-android/NoteX-android.apk
