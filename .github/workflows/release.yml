name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Secrets required (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — https://your-project.supabase.co
#   SUPABASE_ANON_KEY  — your Supabase anon/public key

jobs:
  # ── Windows — MSIX package ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=dart_defines.json

      - name: Create MSIX package
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          # Decode PFX from GitHub Secret
          [System.Convert]::FromBase64String($env:CERT_BASE64) | Set-Content -Path notex-sign.pfx -AsByteStream

          # Export .cer (public key only — safe to distribute to users)
          $securePwd = ConvertTo-SecureString -String $env:CERT_PASSWORD -Force -AsPlainText
          $pfx = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new(
            (Resolve-Path notex-sign.pfx).Path, $env:CERT_PASSWORD)
          [System.IO.File]::WriteAllBytes(
            "$PWD\NoteX-cert.cer",
            $pfx.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))

          # Create MSIX
          dart run msix:create `
            --certificate-path notex-sign.pfx `
            --certificate-password $env:CERT_PASSWORD `
            --output-path . `
            --output-name NoteX-windows

          # Copy install script next to artifacts
          Copy-Item windows\Install-NoteX.ps1 Install-NoteX.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-windows
          path: |
            NoteX-windows.msix
            NoteX-cert.cer
            Install-NoteX.ps1

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── macOS — .zip (ad-hoc signed) ──────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Apply macOS squircle icon shape
        run: |
          pip3 install Pillow --quiet --break-system-packages
          python3 scripts/apply_macos_icon.py

      - name: Build macOS
        # CODE_SIGN_IDENTITY="" + CODE_SIGNING_REQUIRED=NO tells xcodebuild to
        # skip automatic certificate lookup. We do our own ad-hoc sign below.
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: flutter build macos --release --dart-define-from-file=dart_defines.json

      - name: Sign app (ad-hoc — avoids "malware" Gatekeeper message)
        run: |
          codesign --force --deep --sign - \
            build/macos/Build/Products/Release/notex.app

      - name: Create macOS ZIP
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent notex.app ../../../../../NoteX-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-macos
          path: NoteX-macos.zip

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── Linux — .deb package ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libsqlite3-dev \
            libasound2-dev libmpv-dev pkg-config

      - name: Install dependencies
        run: flutter pub get

      - name: Create dart defines file
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 -c "import json,os; json.dump({'SUPABASE_URL':os.environ['SUPABASE_URL'].strip(),'SUPABASE_ANON_KEY':os.environ['SUPABASE_ANON_KEY'].strip()},open('dart_defines.json','w'))"

      - name: Build Linux
        run: flutter build linux --release --dart-define-from-file=dart_defines.json

      - name: Build DEB package
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
          mkdir -p deb/usr/lib/notex
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN

          # Copy app bundle
          cp -r build/linux/x64/release/bundle/. deb/usr/lib/notex/

          # Desktop entry
          cat > deb/usr/share/applications/notex.desktop << 'EOF'
          [Desktop Entry]
          Name=NoteX
          Comment=A beautiful desktop notes app
          Exec=/usr/lib/notex/notex
          Icon=notex
          Terminal=false
          Type=Application
          Categories=Utility;Office;
          EOF

          # Debian control file
          cat > deb/DEBIAN/control << EOF
          Package: notex
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: NoteX <noreply@github.com>
          Description: NoteX - A beautiful desktop notes app
           Rich text editing, Markdown support, projects, cloud sync via Supabase.
          EOF

          chmod 755 deb/DEBIAN
          dpkg-deb --build deb NoteX-linux.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteX-linux
          path: NoteX-linux.deb

      - name: Cancel workflow on failure
        if: failure()
        uses: andymckay/cancel-action@0.3

  # ── Create GitHub Release ──────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/NoteX-windows/NoteX-windows.msix
            artifacts/NoteX-windows/NoteX-cert.cer
            artifacts/NoteX-windows/Install-NoteX.ps1
            artifacts/NoteX-macos/NoteX-macos.zip
            artifacts/NoteX-linux/NoteX-linux.deb
